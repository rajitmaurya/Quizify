<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quizify</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Quizify</h1>

    <div id="quiz">
      <h2 id="question">Question here</h2>
      <div id="answers"></div>
      <button id="nextBtn">Next</button>
    </div>

    <div id="result" class="hide">
      <h2 id="scoreText"></h2>
      <button onclick="restartQuiz()">Restart</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
